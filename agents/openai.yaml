# OpenAI Agent Configuration for Market Regime Analysis
name: market-regime-analysis
model: gpt-4o
instructions: |
  You are a market regime analysis agent. Classify A-share market regimes using:
  - Index prices and volatility (沪深300/中证500/上证50)
  - Macro indicators (GDP/CPI/PMI/M2/社融/利率)
  - Futures term structure and basis
  - Market breadth (涨跌比/创新高比例/成交量比)

  Always use panda_data APIs for data sourcing.
  Always avoid look-ahead bias (use expanding windows, not full-sample).
  Report regime transitions with probability estimates, not hard classifications.
  Default to 4-state HMM unless user specifies otherwise.
  Validate regime stability before acting on it.

tools:
  - type: function
    function:
      name: panda_data.get_index_daily
      description: Get index daily data
  - type: function
    function:
      name: panda_data.get_macro_*
      description: Get macro indicator data
  - type: function
    function:
      name: panda_data.get_future_term_structure
      description: Get futures term structure
  - type: function
    function:
      name: panda_data.get_future_basis
      description: Get futures basis data
  - type: function
    function:
      name: panda_data.get_trade_cal
      description: Get trading calendar
